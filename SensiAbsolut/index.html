<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSI ABSOLUTA</title>

<link rel="icon" type="image/png" href="azul.jpg">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

/* =========================================
RESET
========================================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020816;
color:white;
font-family:'Orbitron',sans-serif;
overflow-x:hidden;
}

/* =========================================
FUNDO TECNOLÓGICO
========================================= */

.bg{
position:fixed;
inset:0;

background:
radial-gradient(circle at top,#005eff33,transparent 35%),
radial-gradient(circle at bottom,#00b7ff22,transparent 35%),
#020816;

z-index:-5;
}

.grid{
position:fixed;
inset:0;

background-image:
linear-gradient(rgba(0,140,255,.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,140,255,.06) 1px, transparent 1px);

background-size:40px 40px;

animation:gridMove 10s linear infinite;

z-index:-4;
}

@keyframes gridMove{

from{
transform:translateY(0px);
}

to{
transform:translateY(40px);
}

}

/* =========================================
LINHAS
========================================= */

.tech-lines{
position:fixed;
inset:0;
overflow:hidden;
z-index:-3;
}

.line{
position:absolute;

width:2px;
height:200px;

background:
linear-gradient(to bottom,
transparent,
#00b7ff,
transparent);

opacity:.4;

animation:lineMove linear infinite;
}

.line:nth-child(1){left:10%;animation-duration:6s;}
.line:nth-child(2){left:25%;animation-duration:9s;}
.line:nth-child(3){left:40%;animation-duration:7s;}
.line:nth-child(4){left:55%;animation-duration:11s;}
.line:nth-child(5){left:70%;animation-duration:8s;}
.line:nth-child(6){left:85%;animation-duration:10s;}

@keyframes lineMove{

from{
transform:translateY(-250px);
}

to{
transform:translateY(120vh);
}

}

/* =========================================
PARTÍCULAS
========================================= */

.particles{
position:fixed;
inset:0;
overflow:hidden;
z-index:-2;
}

.particle{
position:absolute;

width:4px;
height:4px;

border-radius:50%;

background:#00b7ff;

box-shadow:
0 0 10px #00b7ff,
0 0 20px #00b7ff;

animation:floatParticle linear infinite;
}

.particle:nth-child(1){left:5%;animation-duration:8s;}
.particle:nth-child(2){left:20%;animation-duration:12s;}
.particle:nth-child(3){left:35%;animation-duration:9s;}
.particle:nth-child(4){left:50%;animation-duration:14s;}
.particle:nth-child(5){left:65%;animation-duration:10s;}
.particle:nth-child(6){left:80%;animation-duration:13s;}
.particle:nth-child(7){left:92%;animation-duration:11s;}

@keyframes floatParticle{

from{
transform:translateY(110vh) scale(0);
opacity:0;
}

50%{
opacity:1;
}

to{
transform:translateY(-20vh) scale(1);
opacity:0;
}

}

/* =========================================
GLOW
========================================= */

.glow{
position:fixed;

width:600px;
height:600px;

background:#0077ff22;

border-radius:50%;

filter:blur(120px);

top:-150px;
right:-150px;

animation:glowMove 8s ease-in-out infinite alternate;

z-index:-1;
}

@keyframes glowMove{

from{
transform:translateX(0px) translateY(0px);
}

to{
transform:translateX(-80px) translateY(50px);
}

}

/* =========================================
HEADER
========================================= */

header{
text-align:center;
padding:60px 20px 20px;
}

.logo{
font-size:4rem;
color:#00aaff;

text-shadow:
0 0 15px #00aaff,
0 0 40px #00aaff,
0 0 80px #00aaff;
}

.sub{
margin-top:15px;
color:#99cfff;
}

/* =========================================
STATUS ONLINE
========================================= */

.live-status{

margin:auto;
margin-bottom:40px;

width:fit-content;

display:flex;
align-items:center;
gap:14px;

padding:14px 24px;

border-radius:20px;

background:rgba(255,255,255,.04);

border:1px solid rgba(0,255,120,.15);

backdrop-filter:blur(10px);
}

.online-indicator{

width:16px;
height:16px;

border-radius:50%;

background:#00ff88;

box-shadow:
0 0 10px #00ff88,
0 0 25px #00ff88,
0 0 45px #00ff88;

animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

/* =========================================
MAIN
========================================= */

.container{
width:95%;
max-width:1200px;
margin:auto;
}

.main-card{

background:rgba(255,255,255,.05);

border:1px solid rgba(0,170,255,.15);

border-radius:30px;

backdrop-filter:blur(20px);

padding:40px;
}

/* =========================================
FORM
========================================= */

.form-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.select-box{
display:flex;
flex-direction:column;
gap:10px;
}

label{
color:#7fcfff;
}

select{

background:#081321;

border:1px solid #0f5ca0;

color:white;

padding:16px;

border-radius:15px;

font-family:'Orbitron';
}

/* =========================================
BOTÃO
========================================= */

.generate-btn{

margin-top:30px;

width:100%;

padding:20px;

border:none;

border-radius:20px;

background:linear-gradient(90deg,#006eff,#00b7ff);

color:white;

font-family:'Orbitron';

font-size:1rem;

cursor:pointer;

transition:.3s;
}

.generate-btn:hover{

transform:scale(1.02);

box-shadow:
0 0 25px #008cff,
0 0 60px #008cff44;
}

/* =========================================
LOADING
========================================= */

.loading-screen{

margin-top:40px;

text-align:center;
}

.hidden{
display:none;
}

.loader-circle{

width:120px;
height:120px;

margin:auto;

border-radius:50%;

border:5px solid #08345e;
border-top:5px solid #00b7ff;

animation:spin 1s linear infinite;

box-shadow:
0 0 20px #00b7ff55;
}

.loading-text{

margin-top:25px;

color:#8fd2ff;

animation:blink 1s infinite;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes blink{

0%{
opacity:1;
}

50%{
opacity:.4;
}

100%{
opacity:1;
}

}

/* =========================================
PROGRESSO
========================================= */

.progress-box{

margin-top:30px;

width:100%;
height:25px;

background:#081321;

border-radius:20px;

overflow:hidden;
}

.progress-fill{

height:100%;

width:0%;

background:
linear-gradient(90deg,#006eff,#00eeff);

transition:width .3s;

box-shadow:
0 0 20px #00b7ff;
}

.progress-text{

margin-top:15px;

font-size:.9rem;

color:#7fcfff;

animation:blink 1s infinite;
}

/* =========================================
RESULTADOS
========================================= */

.results{
margin-top:40px;
}

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;
}

.card{

background:rgba(255,255,255,.04);

border:1px solid rgba(0,170,255,.15);

border-radius:20px;

padding:30px;

text-align:center;

position:relative;

overflow:hidden;

animation:cardAppear .6s ease;
}

.card::before{

content:"";

position:absolute;

top:-100%;
left:-50%;

width:200%;
height:200%;

background:
linear-gradient(
120deg,
transparent,
rgba(255,255,255,.15),
transparent
);

transform:rotate(25deg);

animation:holo 4s linear infinite;
}

@keyframes holo{

from{
transform:translateX(-100%) rotate(25deg);
}

to{
transform:translateX(100%) rotate(25deg);
}

}

@keyframes cardAppear{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

.card h3{
margin-bottom:15px;
color:#8fd2ff;
}

.value{
font-size:2rem;
color:#00b7ff;
}

/* =========================================
NOTIFICAÇÕES
========================================= */

#notifyContainer{

position:fixed;

top:20px;
right:20px;

display:flex;
flex-direction:column;

gap:15px;

z-index:99999;
}

.notify{

background:rgba(0,0,0,.7);

border:1px solid #00b7ff55;

padding:15px 20px;

border-radius:15px;

backdrop-filter:blur(10px);

animation:notifyAnim .5s ease;

box-shadow:0 0 20px #00b7ff33;
}

@keyframes notifyAnim{

from{
opacity:0;
transform:translateX(100px);
}

to{
opacity:1;
transform:translateX(0px);
}

}

/* =========================================
HISTÓRICO
========================================= */

.history-box{

margin-top:40px;

background:rgba(255,255,255,.03);

border:1px solid rgba(0,170,255,.15);

padding:30px;

border-radius:25px;
}

.history-box h2{

margin-bottom:20px;

color:#00b7ff;
}

.history-item{

padding:15px;

background:#081321;

border-radius:15px;

margin-bottom:15px;

animation:cardAppear .5s ease;
}

/* =========================================
PREMIUM
========================================= */

.premium-tag{

position:fixed;

bottom:20px;
left:20px;

padding:14px 22px;

border-radius:20px;

background:
linear-gradient(90deg,#ffd700,#ffae00);

color:black;

font-weight:bold;

box-shadow:
0 0 20px #ffd700;

z-index:9999;

animation:premiumGlow 2s infinite;
}

@keyframes premiumGlow{

0%{
transform:scale(1);
}

50%{
transform:scale(1.05);
}

100%{
transform:scale(1);
}

}

/* =========================================
CURSOR PARTICLES
========================================= */

.cursor-particle{

position:fixed;

width:6px;
height:6px;

border-radius:50%;

background:#00b7ff;

pointer-events:none;

box-shadow:
0 0 15px #00b7ff;

animation:fadeOut .8s linear forwards;

z-index:99999;
}

@keyframes fadeOut{

to{
opacity:0;
transform:scale(0);
}

}

</style>

</head>

<body>

<div class="bg"></div>

<div class="grid"></div>

<div class="tech-lines">

<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>
<div class="line"></div>

</div>

<div class="particles">

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

</div>

<div class="glow"></div>

<header>

<h1 class="logo">SENSI ABSOLUTA</h1>

<p class="sub">
A sensibilidade perfeita para qualquer celular
</p>

</header>

<div class="live-status">

<div class="online-indicator"></div>

<p>
<span id="viewerCount">1847</span>
PESSOAS ONLINE AGORA
</p>

</div>

<div class="container">

<div class="main-card">

<div class="form-grid">

<div class="select-box">

<label>ESCOLHA O APARELHO</label>

<select id="device"></select>

</div>

<div class="select-box">

<label>ESTILO DE JOGO</label>

<select id="style">

<option>Rushadão</option>
<option>Sniper</option>
<option>Suporte</option>
<option>Camper</option>
<option>Competitivo</option>

</select>

</div>

<div class="select-box">

<label>QUANTOS DEDOS?</label>

<select id="fingers">

<option>2 Dedos</option>
<option>3 Dedos</option>
<option>4 Dedos</option>
<option>5 Dedos</option>

</select>

</div>

<div class="select-box">

<label>NÍVEL DE SENSIBILIDADE</label>

<select id="sensiType">

<option>Alta</option>
<option>Média</option>
<option>Baixa</option>

</select>

</div>

</div>

<button class="generate-btn" onclick="generateSensi()">
GERAR DPI ABSOLUTA
</button>

<!-- LOADING -->

<div class="loading-screen hidden" id="loading">

<div class="loader-circle"></div>

<h2 class="loading-text" id="progressText">
INICIANDO ANÁLISE...
</h2>

<div class="progress-box">

<div class="progress-fill" id="progressFill"></div>

</div>

</div>

<!-- RESULTADOS -->

<div class="results hidden" id="results">

<div class="cards">

<div class="card">
<h3>DPI</h3>
<div class="value" id="dpi"></div>
</div>

<div class="card">
<h3>GERAL</h3>
<div class="value" id="general"></div>
</div>

<div class="card">
<h3>RED DOT</h3>
<div class="value" id="red"></div>
</div>

<div class="card">
<h3>2X</h3>
<div class="value" id="scope2x"></div>
</div>

<div class="card">
<h3>4X</h3>
<div class="value" id="scope4x"></div>
</div>

<div class="card">
<h3>AWM</h3>
<div class="value" id="awm"></div>
</div>

</div>

<!-- HISTÓRICO -->

<div class="history-box">

<h2>ÚLTIMAS SENSIS GERADAS</h2>

<div id="historyList"></div>

</div>

</div>

</div>

</div>

<!-- PREMIUM -->

<div class="premium-tag">
IA PREMIUM ATIVADA
</div>

<!-- NOTIFICAÇÕES -->

<div id="notifyContainer"></div>

<!-- ÁUDIOS -->

<audio id="clickSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=click-124467.mp3">
</audio>

<audio id="successSound">
<source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_270c050f1f.mp3?filename=success-1-6297.mp3">
</audio>

<script>

/* =========================================
BANCO DE APARELHOS
========================================= */

const devices = {

"Redmi Note 15C":{dpi:620},
"Redmi Note 14":{dpi:640},
"Redmi Note 13":{dpi:650},
"Poco X6 Pro":{dpi:590},
"Samsung S24 Ultra":{dpi:500},
"Samsung A55":{dpi:610},
"Samsung A54":{dpi:620},
"iPhone 15 Pro Max":{dpi:520},
"iPhone 14 Pro":{dpi:530},
"iPhone 13":{dpi:550},
"Moto G84":{dpi:630},
"Moto G54":{dpi:640}

}

/* =========================================
CARREGAR APARELHOS
========================================= */

const deviceSelect =
document.getElementById("device")

Object.keys(devices).forEach(device=>{

const option =
document.createElement("option")

option.value = device

option.textContent = device

deviceSelect.appendChild(option)

})

/* =========================================
RANDOM
========================================= */

function random(min,max){

return Math.floor(Math.random()*(max-min+1)+min)

}

/* =========================================
ÁUDIO
========================================= */

const clickSound =
document.getElementById("clickSound")

const successSound =
document.getElementById("successSound")

/* =========================================
GERAR SENSI
========================================= */

function generateSensi(){

clickSound.play()

const loading =
document.getElementById("loading")

const results =
document.getElementById("results")

loading.classList.remove("hidden")

results.classList.add("hidden")

const fill =
document.getElementById("progressFill")

const text =
document.getElementById("progressText")

fill.style.width = "0%"

let percent = 0

const loadingTexts = [

"ANALISANDO TELA...",
"CALCULANDO DPI...",
"OTIMIZANDO CAPA...",
"REDUZINDO INPUT LAG...",
"FINALIZANDO IA..."

]

let textIndex = 0

const progressInterval =
setInterval(()=>{

percent += 5

fill.style.width = percent+"%"

if(percent % 20 === 0){

text.innerText =
loadingTexts[textIndex]

textIndex++

}

if(percent >= 100){

clearInterval(progressInterval)

loading.classList.add("hidden")

results.classList.remove("hidden")

successSound.play()

const selectedDevice =
document.getElementById("device").value

const style =
document.getElementById("style").value

const fingers =
document.getElementById("fingers").value

const sensiType =
document.getElementById("sensiType").value

const phone =
devices[selectedDevice]

let dpi =
phone.dpi

/* AJUSTES */

if(style === "Rushadão"){
dpi += 20
}

if(style === "Sniper"){
dpi -= 30
}

if(style === "Camper"){
dpi -= 20
}

if(style === "Suporte"){
dpi -= 10
}

if(fingers === "2 Dedos"){
dpi += 15
}

if(fingers === "4 Dedos"){
dpi -= 10
}

if(fingers === "5 Dedos"){
dpi -= 20
}

if(sensiType === "Alta"){
dpi += 35
}

if(sensiType === "Baixa"){
dpi -= 35
}

/* RESULTADOS */

animateValue("dpi",0,dpi,1000)

animateValue("general",0,random(85,100),1000)

animateValue("red",0,random(80,100),1000)

animateValue("scope2x",0,random(70,95),1000)

animateValue("scope4x",0,random(60,85),1000)

animateValue("awm",0,random(10,50),1000)

/* HISTÓRICO */

const historyList =
document.getElementById("historyList")

const item =
document.createElement("div")

item.className = "history-item"

item.innerHTML =
`${selectedDevice} • DPI ${dpi}`

historyList.prepend(item)

}

},150)

}

/* =========================================
ANIMAÇÃO NUMÉRICA
========================================= */

function animateValue(id,start,end,duration){

let range = end - start

let current = start

let increment = end > start ? 1 : -1

let stepTime =
Math.abs(Math.floor(duration / range))

const obj =
document.getElementById(id)

const timer =
setInterval(()=>{

current += increment

obj.innerHTML = current

if(current == end){

clearInterval(timer)

}

},stepTime)

}

/* =========================================
VIEWERS
========================================= */

const viewerElement =
document.getElementById("viewerCount")

let viewers = 1847

setInterval(()=>{

const randomChange =
Math.floor(Math.random()*25)

const upOrDown =
Math.random() > 0.5

if(upOrDown){

viewers += randomChange

}else{

viewers -= randomChange

}

if(viewers < 1200){
viewers = 1200
}

if(viewers > 3500){
viewers = 3500
}

viewerElement.innerText =
viewers.toLocaleString("pt-BR")

},2000)

/* =========================================
NOTIFICAÇÕES
========================================= */

const notifyContainer =
document.getElementById("notifyContainer")

const fakeNames = [

"Lucas",
"Pedro",
"Arthur",
"Kauan",
"João",
"Mateus",
"Rafa",
"Gustavo"

]

function createNotify(){

const notify =
document.createElement("div")

notify.className = "notify"

const randomName =
fakeNames[Math.floor(Math.random()*fakeNames.length)]

notify.innerHTML =
`${randomName} acabou de gerar uma sensi ultra`

notifyContainer.appendChild(notify)

setTimeout(()=>{

notify.remove()

},4000)

}

setInterval(createNotify,5000)

/* =========================================
PARTÍCULAS DO CURSOR
========================================= */

document.addEventListener("mousemove",(e)=>{

const particle =
document.createElement("div")

particle.className = "cursor-particle"

particle.style.left = e.clientX+"px"

particle.style.top = e.clientY+"px"

document.body.appendChild(particle)

setTimeout(()=>{

particle.remove()

},800)

})

</script>

</body>
</html>
